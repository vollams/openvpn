<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vollam Developer</title>
    <style>
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        .sky {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #0a0a20, #000000);
        }
        .moon {
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #fce883;
            border-radius: 50%;
            box-shadow: 0 0 30px #fce883, 0 0 60px #fce883;
            top: 15%;
            left: 20%;
            animation: moonRise 15s infinite alternate;
        }
        
        @keyframes moonRise {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-20px);
            }
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 1.5s infinite alternate;
        }
        
        @keyframes twinkle {
            from {
                opacity: 0.5;
            }
            to {
                opacity: 1;
            }
        }
      	.center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            z-index: 10;
        }

        .center-content h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        .center-content a {
            display: inline-block;
            margin-top: 15px;
            font-size: 18px;
            color: #d1d1d1;
            text-decoration: none;
            padding: 8px 18px;
            border: 1px solid #d1d1d1;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .center-content a:hover {
            background-color: #999999;
            color: #000;
            box-shadow: 0 0 15px #999999;
        }
    </style>
</head>
<body>
    <div class="sky">
        <div class="moon"></div>
        <div class="stars-container"></div>
    </div>
  	<div class="center-content">
        <h1>VOLLAM DEVELOPER</h1>
        <a href="https://www.facebook.com/vollams" target="_blank">
            Facebook
        </a>
		<a href="https://wa.me/+966598126771" target="_blank">
            WhatsApp
        </a>
    </div>
    <script>
        /* JavaScript Goes Here */
        const starsContainer = document.querySelector('.stars-container');
        const numberOfStars = 200; // يمكنك تيير دد النجوم
        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            starsContainer.appendChild(star);
            // تحديد موقع شوائي للنجوم
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            // تحدد حجم عشوائي للنجوم
            const size = Math.random() * 3 + 1; // من 1px إلى 4px
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            // تأخير شوائي لوميض لجعها تبدو طبيعية
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${Math.random() * 1.5 + 1}s`;
        }
    </script>
  
  	<audio id="bgMusic" autoplay muted loop preload="auto">
        <source src="../meetyourself.mp3" type="audio/mpeg">
    </audio>

    <script>
    document.addEventListener("click", function () {
        const music = document.getElementById("bgMusic");
        music.muted = false;
        music.play();
    }, { once: true });
    </script>
